<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recurring Tasks</title>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    window.mermaid = mermaid;
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  </script>
  <style>
    body { font-family: Inter, system-ui, -apple-system, sans-serif; margin: 20px; background:#0b1020; color:#e8ecff; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    button { background:#3b82f6; color:#fff; border:0; border-radius:8px; padding:8px 12px; cursor:pointer; }
    .meta { opacity:.8; font-size:.9rem; }
    .card { background:#141a33; border:1px solid #2a335f; border-radius:12px; padding:14px; margin-bottom:14px; }
    table { width:100%; border-collapse: collapse; font-size: .92rem; }
    th, td { padding:8px; border-bottom:1px solid #273062; text-align:left; vertical-align:top; }
    th { color:#9fb2ff; font-weight:600; }
    code { background:#0f1430; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Recurring Tasks</h1>
      <button onclick="load()">Refresh</button>
    </div>
    <div class="meta" id="meta">Loading…</div>

    <div class="card">
      <h3>Visual Map</h3>
      <div id="diagram" class="mermaid">Loading diagram…</div>
    </div>

    <div class="card">
      <h3>Recurring Tasks List</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Cadence</th>
            <th>Schedule</th>
            <th>Model</th>
            <th>Delivery</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
    function scheduleText(s){
      if (!s) return '';
      if (s.kind === 'every') return `every ${s.everyMs}ms`;
      if (s.kind === 'cron') return `${s.expr}${s.tz ? ' (' + s.tz + ')' : ''}`;
      return JSON.stringify(s);
    }

    function makeMermaid(jobs){
      const groups = {
        'hourly-ish': jobs.filter(j=>j.cadence==='hourly-ish'),
        'daily-ish': jobs.filter(j=>j.cadence==='daily-ish'),
        'weekly-ish': jobs.filter(j=>j.cadence==='weekly-ish'),
        'other': jobs.filter(j=>j.cadence==='other'),
      };
      let out = 'flowchart LR\n';
      out += '  scheduler([OpenClaw Recurring Scheduler])\n';
      const mk = (name) => name.replace(/[^a-zA-Z0-9]/g,'_').slice(0,38);
      Object.entries(groups).forEach(([g,items],gi)=>{
        out += `  subgraph G${gi}[${g}]\n`;
        items.forEach((it,ii)=>{
          const id = `n_${gi}_${ii}_${mk(it.name)}`;
          const label = `${it.name}\\n${it.model}`.replace(/"/g,'');
          out += `    ${id}["${label}"]\n`;
          out += `    scheduler --> ${id}\n`;
        });
        out += '  end\n';
      });
      return out;
    }

    async function load(){
      const res = await fetch('api/recurring');
      const data = await res.json();
      document.getElementById('meta').textContent = `Generated ${new Date(data.generatedAt).toLocaleString()} · ${data.totalRecurring} recurring tasks`;

      const rows = data.jobs.map(j => `
        <tr>
          <td><code>${esc(j.name)}</code></td>
          <td>${esc(j.cadence)}</td>
          <td>${esc(scheduleText(j.schedule))}</td>
          <td>${esc(j.model)}</td>
          <td>${esc(j.delivery)}</td>
        </tr>`).join('');
      document.getElementById('rows').innerHTML = rows;

      const diag = document.getElementById('diagram');
      diag.textContent = makeMermaid(data.jobs);
      await window.mermaid.run({ nodes: [diag] });
    }

    load().catch(err => {
      document.getElementById('meta').textContent = 'Failed to load recurring tasks: ' + err.message;
    });
  </script>
</body>
</html>
